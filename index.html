<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌾 Farm Tycoon</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app">
    <!-- TOP BAR -->
    <div id="topbar" class="glass-panel">
        <div class="logo">🌾 Farm Tycoon</div>
        <div class="stat-chip">💰 <span id="coin-val">100</span></div>
        <div class="stat-chip">⭐ Lv <span id="level-val">1</span></div>
        <div class="stat-chip" id="weather-chip">☀️ Cerah</div>
        <div class="stat-chip" title="Bonus Harga Jual">✨ Prestige: <span id="prestige-val">0</span></div>
        <button class="act-btn" id="btn-mute" style="width:auto; padding: 4px 10px; margin: 0; min-width: 0; border-radius:20px;" onclick="toggleAudio()">🔊 Sound</button>
        <div id="xp-wrap">
            <div id="xp-label">XP: <span id="xp-val">0</span>/<span id="xp-need">100</span></div>
            <div id="xp-bar-outer"><div id="xp-bar" style="width:0%"></div></div>
        </div>
    </div>

    <div id="main">
        <!-- SIDEBAR KIRI -->
        <div class="sidebar glass-panel">
            <div class="section-title">🛒 Shop Bibit</div>
            <div id="shop-list"></div>

            <div class="section-title">🌱 PILIH TANAMAN</div>
            <div id="crop-list"></div>

            <div class="section-title" style="margin-top:20px;">🐔 HEWAN TERNAK</div>
            <div id="animal-list"></div>

            <div class="section-title" style="margin-top:20px;">🏡 DEKORASI</div>
            <div id="deco-list"></div>

            <div class="section-title">⚡ Booster</div>
            <button class="shop-btn" id="btn-boost-growth" onclick="buyBooster('growth')">⚡ Growth ×1.5 <span class="price">50💰</span></button>
            <button class="shop-btn" id="btn-boost-coin" onclick="buyBooster('coin')">💰 Coin ×2 <span class="price">100💰</span></button>
            
            <div class="section-title" style="margin-top:20px;">🧙‍♂️ Pekerja (Auto)</div>
            <button class="shop-btn" id="btn-buy-gnome" onclick="buyGnome()">🧙‍♂️ Kurcaci Pembantu <span class="price">5000💰</span></button>

            <div class="section-title" style="margin-top:20px;">🏆 Achievements</div>
            <div id="achieve-count" style="font-size:12px;color:var(--muted)">0 / 12</div>
        </div>

        <!-- FARM AREA -->
        <div id="farm-area" class="glass-panel">
            <div class="farm-header-wrap">
                <div id="weather-bar" class="glass-panel">
                    <span id="weather-icon">☀️</span>
                    <span id="weather-name">Cerah</span>
                    <span style="margin-left:10px;color:var(--muted);font-size:12px" id="weather-timer">Next: 5:00</span>
                </div>
                <div class="actions">
                    <button class="act-btn" onclick="toggleFullScreen()" id="btn-fullscreen" title="Fullscreen">🔲</button>
                    <button class="act-btn" id="btn-toggle-gnome" onclick="toggleGnome()" style="display:none; background: linear-gradient(135deg, #a855f7, #9333ea); color: white; border: none; font-weight: bold; text-shadow: 0 1px 2px rgba(0,0,0,0.3);">🧙‍♂️ Auto: OFF</button>
                    <button class="act-btn primary" onclick="claimDaily()">🎁 Daily</button>
                    <button class="act-btn" onclick="saveGame(true)">💾 Save</button>
                    <button class="act-btn" onclick="confirmReset()">🔄 Reset</button>
                </div>
            </div>
            <div id="farm-decorations-area" style="display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; min-height: 20px; align-items: flex-end; padding: 10px 20px;"></div>
            <div id="farm-grid" class="glass-panel"></div>
            
            <!-- ANIMAL BARN -->
            <div class="farm-header-wrap" style="margin-top: 24px;">
                <div class="section-title">🛖 Area Peternakan</div>
            </div>
            <div id="barn-container" style="position: relative; height: 240px; overflow: hidden; background-color: #4ade80; background-image: radial-gradient(#854d0e 20%, transparent 20%), radial-gradient(#854d0e 20%, transparent 20%); background-size: 60px 60px; background-position: 0 0, 30px 30px; border: 12px solid #78350f; border-radius: 16px; box-shadow: inset 0 0 40px rgba(0,0,0,0.6);">
                <div style="position: absolute; top: 10px; left: 10px; font-size: 70px; filter: drop-shadow(0 8px 8px rgba(0,0,0,0.6));">🛖</div>
                
                <!-- Tempat Makan -->
                <div style="position: absolute; top: 20px; right: 20px; width: 80px; height: 40px; background: #a16207; border: 6px solid #451a03; border-radius: 20px; box-shadow: 0 5px 10px rgba(0,0,0,0.5);"></div>
                <div style="position: absolute; top: 10px; right: 25px; font-size: 45px; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3));">🌾</div>
                <div style="position: absolute; top: 15px; right: 50px; font-size: 40px; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3));">🌾</div>

                <!-- Tempat Minum -->
                <div style="position: absolute; bottom: 20px; right: 20px; width: 60px; height: 60px; background: #3b82f6; border: 6px solid #94a3b8; border-radius: 50%; box-shadow: 0 5px 10px rgba(0,0,0,0.5);"></div>
                <div style="position: absolute; bottom: 30px; right: 30px; font-size: 35px;">💧</div>

                <div id="farm-animals-area" style="position: absolute; inset: 0; z-index: 100;"></div>
            </div>
            
            <!-- ORDER BOARD -->
            <div class="farm-header-wrap" style="margin-top: 24px;">
                <div class="section-title">📜 Papan Pesanan</div>
            </div>
            <div id="order-board" class="glass-panel" style="display: flex; gap: 16px; overflow-x: auto; padding: 20px;">
                <!-- Orders will be injected here -->
            </div>
        </div>

        <!-- RIGHT PANEL -->
        <div id="right-panel" class="glass-panel">
            <div class="section-title">📦 Inventory</div>
            <div id="inv-list"></div>
            <button class="sell-btn" onclick="sellAll()">💰 Jual Semua</button>

            <div class="section-title">📋 Quest Harian</div>
            <div id="quest-list"></div>
        </div>
    </div>
</div>

<div class="rain-overlay"></div>
<div id="toast-container"></div>

<!-- MODAL -->
<div class="modal-bg" id="modal">
    <div class="modal">
        <h2 id="modal-title">Konfirmasi</h2>
        <p id="modal-msg">Apakah Anda yakin?</p>
        <div class="modal-btns">
            <button class="act-btn" onclick="closeModal()">Batal</button>
            <button class="act-btn primary" id="modal-ok">OK</button>
        </div>
    </div>
</div>

<script src="js/audio.js"></script>
<script src="js/config.js"></script>
<script src="js/state.js"></script>
<script src="js/ui.js"></script>
<script src="js/game.js"></script>
<script src="js/main.js"></script>
</body>
</html>
