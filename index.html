<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌾 Farm Tycoon</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div id="app">
        <!-- TOP BAR -->
        <div id="topbar" class="glass-panel">
            <div class="logo">🌾 Farm Tycoon</div>
            <div class="stat-chip">💰 <span id="coin-val">100</span></div>
            <div class="stat-chip">⭐ Lv <span id="level-val">1</span></div>
            <div class="stat-chip" id="weather-chip">☀️ Cerah</div>
            <div class="stat-chip" title="Bonus Harga Jual">✨ Prestige: <span id="prestige-val">0</span></div>
            <button id="btn-mute">🔊 Sound</button>
            <div id="xp-wrap">
                <div id="xp-label">XP: <span id="xp-val">0</span>/<span id="xp-need">100</span></div>
                <div id="xp-bar-outer">
                    <div id="xp-bar" style="width:0%"></div>
                </div>
            </div>
        </div>

        <div id="main">
            <!-- SIDEBAR KIRI -->
            <div class="sidebar glass-panel">
                <div class="section-title">🛒 Shop Bibit</div>
                <div id="shop-list"></div>

                <div class="section-title">🌱 PILIH TANAMAN</div>
                <div id="crop-list"></div>

                <div class="section-title" style="margin-top:20px;">🐔 HEWAN TERNAK</div>
                <div id="animal-list"></div>

                <div class="section-title" style="margin-top:20px;">🏡 DEKORASI</div>
                <div id="deco-list"></div>

                <div class="section-title">⚡ Booster</div>
                <button class="shop-btn" id="btn-boost-growth">⚡ Growth ×1.5 <span class="price">50💰</span></button>
                <button class="shop-btn" id="btn-boost-coin">💰 Coin ×2 <span class="price">100💰</span></button>

                <!-- PEKERJA (AUTO) -->
                <div class="section-title">🧑‍🌾 Pekerja (Auto)</div>
                <button class="shop-btn" id="btn-buy-gnome">
                    <div style="text-align: left;">
                        <div>🧙‍♂️ Trio Kurcaci</div>
                        <div class="text-muted-sm">Auto-Farm & Harvest</div>
                    </div>
                    <span class="price">5000💰</span>
                </button>

                <!-- BANGUNAN -->
                <div class="section-title" style="margin-top:20px;">🏗️ Bangunan</div>
                <div id="building-list"></div>

                <div class="section-title" style="margin-top:20px;">🏆 Achievements</div>
                <div id="achieve-count" class="text-muted-sm">0 / 12</div>
            </div>

            <!-- FARM AREA -->
            <div id="farm-area" class="glass-panel">
                <div class="farm-header-wrap">
                    <div id="weather-bar" class="glass-panel">
                        <span id="weather-icon">☀️</span>
                        <span id="weather-name">Cerah</span>
                        <span class="text-muted-sm" style="margin-left:10px;" id="weather-timer">Next:
                            5:00</span>
                    </div>
                    <div style="flex:1; display:flex; gap:8px;">
                        <button class="act-btn" id="btn-fullscreen"
                            title="Tutup Panel Kiri (Fullscreen)">&lt;&lt;</button>
                        <button class="act-btn" id="btn-toggle-gnome" style="display:none; font-weight:700;">🧙‍♂️ Auto:
                            OFF</button>
                    </div>
                    <div style="display:flex; gap:8px;">
                        <button class="act-btn primary" id="btn-claim-daily">🎁 Daily</button>
                        <button class="act-btn" id="btn-save-game">💾 Save</button>
                        <button class="act-btn" id="btn-reset-game">🔄 Reset</button>
                    </div>
                </div>

                <!-- MAIN FARM GRID -->
                <div class="weather-overlay"></div>
                <div class="farm-grid" id="farm-grid"></div>
                <div id="farm-decorations-area"></div>
                <div id="farm-animals-area"></div>

                <!-- FISHING LAKE -->
                <div class="farm-header-wrap" style="margin-top: 24px;">
                    <div class="section-title">🎣 Danau Pemancingan</div>
                </div>
                <div id="lake-container">
                    <div id="fish-splash"
                        style="display: none; position: absolute; font-size: 30px; animation: bounce 0.5s infinite; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.5)); pointer-events: none;">
                        💦</div>
                </div>
            </div>

            <!-- RIGHT PANEL -->
            <div id="right-panel" class="glass-panel">
                <div class="section-title">📦 Inventory</div>
                <div id="inv-list"></div>
                <button class="sell-btn" id="btn-sell-all">💰 Jual Semua</button>

                <!-- CRAFTING DAPUR -->
                <div class="section-title" style="margin-top:20px;">🍳 Dapur Produksi</div>
                <div id="crafting-queue" style="margin-bottom: 12px;"></div>
                <div id="crafting-recipes"></div>

                <div class="section-title" style="margin-top:20px;">📋 Quest Harian</div>
                <div id="quest-list"></div>
            </div>
        </div>
    </div>

    <div class="rain-overlay"></div>
    <div id="toast-container"></div>

    <!-- MODAL -->
    <div class="modal-bg" id="modal">
        <div class="modal">
            <h2 id="modal-title">Konfirmasi</h2>
            <p id="modal-msg">Apakah Anda yakin?</p>
            <div class="modal-btns">
                <button class="act-btn" id="btn-modal-cancel">Batal</button>
                <button class="act-btn primary" id="modal-ok">OK</button>
            </div>
        </div>
    </div>

    <!-- Legacy Audio Script -->
    <script src="js/audio.js"></script>

    <!-- Modular Game Script -->
    <script type="module" src="js/src/main.js"></script>
</body>

</html>
